server {

    listen       80;
    listen  [::]:80;
    server_name  gardenplanner.app.jactez.com localhost 192.168.1.3;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    location /api/ {
        proxy_pass http://api:8081/;
    }

    location /meteo/ {
        proxy_pass http://meteo:8082/;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
