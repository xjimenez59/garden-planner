


server {

 listen       80;
    listen  [::]:80;
    server_name  gardenplanner.app.jactez.com localhost 192.168.1.3;

    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    location /api/ {
        proxy_pass http://api:8081/;
    }

    location /meteo/ {
        proxy_pass http://meteo:8082/;
    }



    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}

server {
    listen 443 ssl;
    server_name  gardenplanner.app.jactez.com  localhost 192.168.1.3;
    ssl_certificate /etc/nginx/ssl/live/gardenplanner.app.jactez.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/gardenplanner.app.jactez.com/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:80/;
        error_log /var/log/gardenplanner_errors.log;
    }

    location /api/ {
        proxy_pass http://api:8081/;
    }

    location /meteo/ {
        proxy_pass http://meteo:8082/;
    }


}
